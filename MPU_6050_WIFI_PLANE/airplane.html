<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>MPU6050 Airplane Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    background:black;
    color:white;
    font-family:Arial;
}

#panel{
    position:absolute;
    top:10px;
    left:10px;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:8px;
    z-index:100;
}

.value{
    margin:4px;
}
</style>
</head>

<body>

<div id="panel">

<h3>MPU6050</h3>

<div class="value">AX: <span id="ax">0</span></div>
<div class="value">AY: <span id="ay">0</span></div>
<div class="value">AZ: <span id="az">0</span></div>

<br>

<div class="value">GX: <span id="gx">0</span></div>
<div class="value">GY: <span id="gy">0</span></div>
<div class="value">GZ: <span id="gz">0</span></div>

<br>

<div class="value">Roll: <span id="roll">0</span></div>
<div class="value">Pitch: <span id="pitch">0</span></div>

</div>

<script>

const ESP32_IP = "192.168.1.9";

const scene = new THREE.Scene();

const camera =
    new THREE.PerspectiveCamera(
        75,
        window.innerWidth/window.innerHeight,
        0.1,
        1000
    );

camera.position.z = 8;

const renderer =
    new THREE.WebGLRenderer({
        antialias:true
    });

renderer.setSize(
    window.innerWidth,
    window.innerHeight
);

document.body.appendChild(
    renderer.domElement
);

scene.add(
    new THREE.AmbientLight(
        0xffffff,
        2
    )
);

const light =
    new THREE.DirectionalLight(
        0xffffff,
        2
    );

light.position.set(
    5,
    5,
    5
);

scene.add(light);

const airplane =
    new THREE.Group();

const fuselage =
    new THREE.Mesh(
        new THREE.BoxGeometry(
            4,
            0.4,
            0.4
        ),
        new THREE.MeshPhongMaterial({
            color:0xffffff
        })
    );

airplane.add(fuselage);

const wing =
    new THREE.Mesh(
        new THREE.BoxGeometry(
            1,
            4,
            0.1
        ),
        new THREE.MeshPhongMaterial({
            color:0x00aaff
        })
    );

airplane.add(wing);

const tail =
    new THREE.Mesh(
        new THREE.BoxGeometry(
            0.8,
            1.2,
            0.1
        ),
        new THREE.MeshPhongMaterial({
            color:0xff0000
        })
    );

tail.position.x = -1.7;
tail.position.z = 0.3;

airplane.add(tail);

scene.add(airplane);

const axes =
    new THREE.AxesHelper(5);

scene.add(axes);

function accelToAngles(ax,ay,az)
{
    let roll =
        Math.atan2(
            ay,
            az
        );

    let pitch =
        Math.atan2(
            -ax,
            Math.sqrt(
                ay*ay +
                az*az
            )
        );

    return {
        roll,
        pitch
    };
}

async function updateIMU()
{
    try
    {
        const response =
            await fetch(
                "http://" +
                ESP32_IP +
                "/data"
            );

        const d =
            await response.json();

        document.getElementById("ax").innerText =
            d.ax.toFixed(2);

        document.getElementById("ay").innerText =
            d.ay.toFixed(2);

        document.getElementById("az").innerText =
            d.az.toFixed(2);

        document.getElementById("gx").innerText =
            d.gx.toFixed(2);

        document.getElementById("gy").innerText =
            d.gy.toFixed(2);

        document.getElementById("gz").innerText =
            d.gz.toFixed(2);

        const attitude =
            accelToAngles(
                d.ax,
                d.ay,
                d.az
            );

        const rollDeg =
            attitude.roll *
            180 /
            Math.PI;

        const pitchDeg =
            attitude.pitch *
            180 /
            Math.PI;

        document.getElementById("roll").innerText =
            rollDeg.toFixed(1);

        document.getElementById("pitch").innerText =
            pitchDeg.toFixed(1);

        airplane.rotation.z =
            -attitude.roll;

        airplane.rotation.x =
            attitude.pitch;
    }
    catch(err)
    {
        console.log(err);
    }
}

setInterval(
    updateIMU,
    50
);

function animate()
{
    requestAnimationFrame(
        animate
    );

    renderer.render(
        scene,
        camera
    );
}

animate();

</script>

</body>
</html>
